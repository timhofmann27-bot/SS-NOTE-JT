name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ==================== BACKEND TESTS ====================
  backend-test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest httpx pytest-asyncio
      - name: Run backend tests
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: ssnote_test
          JWT_SECRET: test-secret-key-for-ci-at-least-64-characters-long!!
          TESTING: 'true'
        run: |
          cd backend
          pytest tests/ -v --tb=short

  # ==================== SECURITY SCAN (Backend) ====================
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install bandit
        run: pip install bandit
      - name: Run security scan
        run: |
          cd backend
          bandit -r . -ll -f json -o bandit-report.json || true
      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: backend/bandit-report.json

  # ==================== FRONTEND TYPECHECK ====================
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit 2>&1 | grep -v "node_modules" || true

  # ==================== DOCKER BUILD TEST ====================
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t ss-note:test .
      - name: Verify image
        run: |
          docker image inspect ss-note:test --format='{{.Config.User}}' | grep -q heimatfunk

  # ==================== DEPLOY (main only) ====================
  deploy:
    needs: [backend-test, security-scan, frontend-check, docker-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: |
          echo "Deployment would happen here"
          echo "Configure your deployment target (SSH, kubectl, etc.)"
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
