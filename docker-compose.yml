# SS-Note -- Docker Compose (Production-Ready)
# Usage: docker compose up -d
#
# Environment variables (.env file):
#   JWT_SECRET=<64+ char secret>
#   DOMAIN=messenger.example.com
#   ACME_EMAIL=admin@example.com
#   FRONTEND_URL=https://messenger.example.com

services:
  # ==================== APP (FastAPI + Socket.IO) ====================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - memory_data:/app/memory
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=ssnote_db
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:19006}
      - TESTING=${TESTING:-false}
      - SECURE_COOKIES=true
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ss-note.rule=Host(`${DOMAIN:-messenger.example.com}`)"
      - "traefik.http.routers.ss-note.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ss-note.entrypoints=websecure"
      - "traefik.http.services.ss-note.loadbalancer.server.port=8001"
      - "traefik.http.middlewares.ss-note-headers.headers.customResponseHeaders.X-Content-Type-Options=nosniff"
      - "traefik.http.middlewares.ss-note-headers.headers.customResponseHeaders.X-Frame-Options=DENY"
      - "traefik.http.middlewares.ss-note-headers.headers.customResponseHeaders.Referrer-Policy=no-referrer"
      - "traefik.http.routers.ss-note.middlewares=ss-note-headers"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ==================== MONGODB ====================
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - internal
    command: ["--wiredTigerCacheSizeGB", "0.5", "--quiet", "--auth"]
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-ssnote}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS:-change-me-in-production}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ==================== TRAEFIK (Reverse Proxy + AutoTLS) ====================
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/certs
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entryPoint.permanent=true"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json"
      - "--api.dashboard=false"
      - "--log.level=WARN"
      - "--accesslog=false"
    networks:
      - internal
    security_opt:
      - no-new-privileges:true

volumes:
  mongo_data:
  traefik_certs:
  memory_data:

networks:
  internal:
    driver: bridge
    internal: true  # No external access except through Traefik

